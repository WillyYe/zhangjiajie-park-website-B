<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Scenic Detail | Zhangjiajie National Forest Park</title>
  <meta name="description" id="metaDesc" content="Explore Zhangjiajie National Forest Park scenic spots." />
  <meta name="theme-color" content="#1a4a30" />
  
  <!-- Preconnect for Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto Sans+SC:wght@400;500&family=Noto Serif+SC:wght@600;700&display=swap" rel="stylesheet" />
  
  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      color: #1a1a1a;
      background: #fff;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ========== COLOR VARIABLES ========== */
    :root {
      --green-dark: #0d2b1e;
      --green-mid: #1a4a30;
      --green-light: #2d6a4f;
      --green-accent: #52b788;
      --gold: #b5882a;
      --gold-light: #d4a843;
      --cream: #f7f3ee;
      --cream-dark: #e8e4de;
      --text-dark: #1a1a1a;
      --text-mid: #4a4a4a;
      --text-light: #888;
      --white: #fff;
    }

    /* ========== HEADER ========== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: var(--green-dark);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--white);
    }
    .header-logo-icon {
      width: 40px;
      height: 40px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .header-logo-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 14px;
      font-weight: 600;
    }
    .lang-switch {
      display: flex;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
    }
    .lang-switch button {
      padding: 6px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      transition: background 0.2s, color 0.2s;
    }
    .lang-switch button.active {
      background: var(--gold);
      color: var(--white);
    }

    /* ========== HERO SLIDER ========== */
    .hero-slider {
      position: relative;
      height: 70vh;
      min-height: 500px;
      overflow: hidden;
      background: var(--green-dark);
    }
    .hero-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s;
    }
    .hero-slide.active { opacity: 1; }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
    }
    .hero-content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--white);
      padding: 0 24px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .hero-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 8px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .hero-subtitle {
      font-size: clamp(16px, 2vw, 20px);
      opacity: 0.9;
      margin-bottom: 16px;
    }
    .hero-desc {
      font-size: 15px;
      opacity: 0.8;
      max-width: 600px;
      line-height: 1.8;
    }

    /* ========== NAVIGATION ARROWS ========== */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      color: var(--white);
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .nav-arrow:hover {
      background: var(--gold);
      border-color: var(--gold);
    }
    .nav-arrow.prev { left: 32px; }
    .nav-arrow.next { right: 32px; }
    .nav-arrow.disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .nav-arrow.disabled:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.2);
    }

    /* ========== SCENIC NAVIGATION (between scenic spots) ========== */
    .scenic-nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1001;
      width: 60px;
      height: 80px;
      border-radius: 12px;
      background: rgba(13, 43, 30, 0.9);
      backdrop-filter: blur(8px);
      color: var(--white);
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .scenic-nav-arrow:hover {
      background: var(--gold);
      transform: translateY(-50%) scale(1.05);
    }
    .scenic-prev { left: 20px; }
    .scenic-next { right: 20px; }
    .scenic-nav-arrow.disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .scenic-nav-arrow.disabled:hover {
      background: rgba(13, 43, 30, 0.9);
      transform: translateY(-50%);
    }
    .scenic-nav-arrow span {
      font-size: 28px;
    }

    /* ========== SLIDER INDICATOR ========== */
    .slider-indicator {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 8px;
    }
    .indicator-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.3s;
    }
    .indicator-dot.active {
      background: var(--gold);
      width: 24px;
      border-radius: 4px;
    }

    /* ========== CONTENT ========== */
    .content-section {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    .lang-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 40px;
    }
    .lang-btn {
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      background: #f0f0f0;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--green-dark);
      color: var(--white);
    }

    /* ========== INFO CARDS ========== */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin: 32px 0;
    }
    .info-card {
      background: var(--cream);
      padding: 24px;
      border-radius: 12px;
      text-align: center;
      transition: transform 0.25s;
    }
    .info-card:hover {
      transform: translateY(-4px);
    }
    .info-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .info-label {
      font-size: 12px;
      color: var(--text-light);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .info-value {
      font-size: 16px;
      font-weight: 500;
      color: var(--green-dark);
    }

    /* ========== ATTRACTIONS ========== */
    .section {
      margin-bottom: 48px;
    }
    .section-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--green-dark);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--cream-dark);
    }
    .section p {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.9;
      margin-bottom: 16px;
    }
    .attraction-list {
      list-style: none;
      margin: 20px 0;
    }
    .attraction-list li {
      padding: 16px 0;
      border-bottom: 1px solid var(--cream-dark);
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .attraction-list li:last-child {
      border-bottom: none;
    }
    .attraction-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--green-light), var(--green-accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .attraction-info h4 {
      font-size: 16px;
      font-weight: 600;
      color: var(--green-dark);
      margin-bottom: 4px;
    }
    .attraction-info p {
      font-size: 13px;
      color: var(--text-mid);
      margin-bottom: 0;
    }

    /* ========== TIPS ========== */
    .tip-box {
      background: linear-gradient(135deg, #f0faf4, #e8f5ec);
      border-left: 4px solid var(--green-accent);
      padding: 24px;
      border-radius: 0 12px 12px 0;
      margin: 24px 0;
    }
    .tip-box h4 {
      font-size: 15px;
      font-weight: 600;
      color: var(--green-dark);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tip-box ul {
      margin: 12px 0 0;
      padding-left: 20px;
    }
    .tip-box li {
      font-size: 14px;
      color: var(--text-mid);
      margin-bottom: 8px;
    }

    /* ========== CTA ========== */
    .cta-section {
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      color: var(--white);
      padding: 48px;
      border-radius: 16px;
      text-align: center;
      margin-top: 48px;
    }
    .cta-section h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      margin-bottom: 12px;
    }
    .cta-section p {
      opacity: 0.85;
      margin-bottom: 24px;
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--gold);
      color: var(--white);
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s, transform 0.2s;
    }
    .cta-btn:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }

    /* ========== BACK LINK ========== */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--green-mid);
      font-size: 14px;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: var(--green-dark);
    }

    /* ========== FOOTER ========== */
    .footer {
      padding: 40px 24px;
      text-align: center;
      background: var(--cream);
      font-size: 13px;
      color: var(--text-light);
    }
    .footer a {
      color: var(--green-mid);
    }

    /* ========== LANGUAGE TOGGLE ========== */
    [lang="zh"] .en-content { display: none; }
    [lang="en"] .zh-content { display: none; }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .nav-arrow {
        width: 44px;
        height: 44px;
        font-size: 18px;
      }
      .nav-arrow.prev { left: 12px; }
      .nav-arrow.next { right: 12px; }
      .scenic-nav-arrow {
        width: 44px;
        height: 60px;
        font-size: 20px;
      }
      .scenic-prev { left: 8px; }
      .scenic-next { right: 8px; }
      .info-grid { grid-template-columns: repeat(2, 1fr); }
      .cta-section { padding: 32px 24px; }
    }
  </style>
</head>

    // ========== APP STATE ==========
    var AppState = {
      currentLang: 'en',
      currentSlide: 0
    };

    // ========== GET SCENIC ID FROM URL ==========
    function getScenicId() {
      var params = new URLSearchParams(window.location.search);
      return params.get('id') || 'yuanjiajie';
    }

    // ========== GET CURRENT SCENIC DATA ==========
    function getCurrentScenic() {
      var id = getScenicId();
      for (var i = 0; i < allScenicData.length; i++) {
        if (allScenicData[i].id === id) {
          return { data: allScenicData[i], index: i };
        }
      }
      return { data: allScenicData[0], index: 0 };
    }

    // ========== SWITCH LANGUAGE ==========
    function switchLang(lang) {
      AppState.currentLang = lang;
      document.body.lang = lang;
      
      // Update header buttons
      document.querySelectorAll('.lang-switch button').forEach(function(btn) {
        btn.classList.remove('active');
      });
      document.querySelector('.lang-switch button[data-lang="' + lang + '"]').classList.add('active');
      
      // Update page buttons
      document.querySelectorAll('.lang-toggle .lang-btn').forEach(function(btn) {
        btn.classList.remove('active');
      });
      document.querySelector('.lang-toggle .lang-btn[onclick="switchLang(\'' + lang + '\')"]').classList.add('active');
      
      // Re-render content
      renderScenicContent();
    }

    // ========== RENDER HERO SLIDER ==========
    function renderHeroSlider() {
      var scenic = getCurrentScenic().data;
      var slider = document.getElementById('heroSlider');
      var slidesHtml = '';
      
      scenic.images.forEach(function(img, index) {
        slidesHtml += '<div class="hero-slide' + (index === 0 ? ' active' : '') + '">';
        slidesHtml += '<div class="hero-bg" style="background-image: url(\'' + img + '\')"></div>';
        slidesHtml += '<div class="hero-overlay"></div>';
        slidesHtml += '<div class="hero-content">';
        slidesHtml += '<div class="hero-badge">' + scenic.tag + '</div>';
        slidesHtml += '<h1 class="hero-title en-content">' + scenic.name + '</h1>';
        slidesHtml += '<h1 class="hero-title zh-content">' + scenic.nameZh + '</h1>';
        slidesHtml += '<p class="hero-subtitle en-content">' + scenic.subTitle + '</p>';
        slidesHtml += '<p class="hero-subtitle zh-content">' + scenic.subTitleZh + '</p>';
        slidesHtml += '<p class="hero-desc en-content">' + scenic.desc.substring(0, 150) + '...</p>';
        slidesHtml += '<p class="hero-desc zh-content">' + scenic.descZh.substring(0, 100) + '...</p>';
        slidesHtml += '</div></div>';
      });
      
      // Insert slides before navigation arrows
      var prevBtn = document.getElementById('prevBtn');
      prevBtn.insertAdjacentHTML('beforebegin', slidesHtml);
      
      // Update page title and meta
      document.title = scenic.name + ' | Zhangjiajie Park';
      
      // Render indicator dots
      renderSliderIndicator();
      updateNavButtons();
    }

    // ========== RENDER SLIDER INDICATOR ==========
    function renderSliderIndicator() {
      var scenic = getCurrentScenic().data;
      var indicator = document.getElementById('sliderIndicator');
      var dotsHtml = '';
      
      scenic.images.forEach(function(img, index) {
        dotsHtml += '<button class="indicator-dot' + (index === 0 ? ' active' : '') + '" onclick="goToSlide(' + index + ')"></button>';
      });
      
      indicator.innerHTML = dotsHtml;
    }

    // ========== SLIDE NAVIGATION ==========
    function goToSlide(index) {
      var slides = document.querySelectorAll('.hero-slide');
      var dots = document.querySelectorAll('.indicator-dot');
      var scenic = getCurrentScenic().data;
      
      // Bounds check
      if (index < 0 || index >= slides.length) return;
      
      // Update active states
      slides[AppState.currentSlide].classList.remove('active');
      dots[AppState.currentSlide].classList.remove('active');
      
      AppState.currentSlide = index;
      
      slides[AppState.currentSlide].classList.add('active');
      dots[AppState.currentSlide].classList.add('active');
      
      updateNavButtons();
    }

    function prevSlide() {
      var slides = document.querySelectorAll('.hero-slide');
      goToSlide(AppState.currentSlide - 1);
    }

    function nextSlide() {
      var slides = document.querySelectorAll('.hero-slide');
      goToSlide(AppState.currentSlide + 1);
    }

    function updateNavButtons() {
      var slides = document.querySelectorAll('.hero-slide');
      var prevBtn = document.getElementById('prevBtn');
      var nextBtn = document.getElementById('nextBtn');
      
      prevBtn.classList.toggle('disabled', AppState.currentSlide === 0);
      nextBtn.classList.toggle('disabled', AppState.currentSlide === slides.length - 1);
      
      // Update scenic navigation buttons
      var currentScenicInfo = getCurrentScenic();
      var scenicPrevBtn = document.getElementById('scenicPrevBtn');
      var scenicNextBtn = document.getElementById('scenicNextBtn');
      
      scenicPrevBtn.classList.toggle('disabled', currentScenicInfo.index === 0);
      scenicNextBtn.classList.toggle('disabled', currentScenicInfo.index === allScenicData.length - 1);
    }

    // ========== SCENIC NAVIGATION (between different scenic spots) ==========
    function prevScenic() {
      var currentScenicInfo = getCurrentScenic();
      if (currentScenicInfo.index > 0) {
        var prevScenicId = allScenicData[currentScenicInfo.index - 1].id;
        window.location.href = 'scenic-detail.html?id=' + prevScenicId;
      }
    }

    function nextScenic() {
      var currentScenicInfo = getCurrentScenic();
      if (currentScenicInfo.index < allScenicData.length - 1) {
        var nextScenicId = allScenicData[currentScenicInfo.index + 1].id;
        window.location.href = 'scenic-detail.html?id=' + nextScenicId;
      }
    }

    // ========== RENDER SCENIC CONTENT ==========
    function renderScenicContent() {
      var scenic = getCurrentScenic().data;
      var isZh = AppState.currentLang === 'zh';
      var container = document.getElementById('scenicContent');
      
      // Info cards
      var infoHtml = '<div class="info-grid">';
      scenic.info.forEach(function(item) {
        infoHtml += '<div class="info-card">';
        infoHtml += '<div class="info-icon">' + item.icon + '</div>';
        infoHtml += '<div class="info-label en-content">' + item.label + '</div>';
        infoHtml += '<div class="info-label zh-content">' + item.labelZh + '</div>';
        infoHtml += '<div class="info-value">' + item.value + '</div>';
        infoHtml += '</div>';
      });
      infoHtml += '</div>';
      
      // Description
      var descHtml = '<div class="section">';
      descHtml += '<h2 class="section-title en-content">About ' + scenic.name + '</h2>';
      descHtml += '<h2 class="section-title zh-content">关于 ' + scenic.nameZh + '</h2>';
      descHtml += '<p class="en-content">' + scenic.desc + '</p>';
      descHtml += '<p class="zh-content">' + scenic.descZh + '</p>';
      descHtml += '</div>';
      
      // Attractions
      var attractionsHtml = '<div class="section">';
      attractionsHtml += '<h2 class="section-title en-content">Key Attractions</h2>';
      attractionsHtml += '<h2 class="section-title zh-content">主要景点</h2>';
      attractionsHtml += '<ul class="attraction-list">';
      scenic.attractions.forEach(function(attr) {
        attractionsHtml += '<li>';
        attractionsHtml += '<div class="attraction-icon">' + attr.icon + '</div>';
        attractionsHtml += '<div class="attraction-info">';
        attractionsHtml += '<h4 class="en-content">' + attr.name + '</h4>';
        attractionsHtml += '<h4 class="zh-content">' + attr.nameZh + '</h4>';
        attractionsHtml += '<p class="en-content">' + attr.desc + '</p>';
        attractionsHtml += '<p class="zh-content">' + attr.descZh + '</p>';
        attractionsHtml += '</div></li>';
      });
      attractionsHtml += '</ul></div>';
      
      // Tips
      var tipsHtml = '<div class="tip-box">';
      tipsHtml += '<h4>' + (isZh ? '💡 游览贴士' : '💡 Travel Tips') + '</h4>';
      tipsHtml += '<ul>';
      scenic.tips.forEach(function(tip) {
        tipsHtml += '<li class="en-content">' + tip + '</li>';
      });
      scenic.tipsZh.forEach(function(tip) {
        tipsHtml += '<li class="zh-content">' + tip + '</li>';
      });
      tipsHtml += '</ul></div>';
      
      container.innerHTML = infoHtml + descHtml + attractionsHtml + tipsHtml;
    }

    // ========== INITIALIZE ==========
    document.addEventListener('DOMContentLoaded', function() {
      renderHeroSlider();
      renderScenicContent();
    });
  </script>
