      document.querySelectorAll('.lang-switch button').forEach(function(btn) {
        btn.classList.remove('active');
      });
      document.querySelector('.lang-switch button[data-lang="' + lang + '"]').classList.add('active');

      // Re-render content
      renderNewsDetail();
      renderRelatedNews();
    }

    // ========== RENDER NEWS DETAIL ==========
    function renderNewsDetail() {
      var news = getCurrentNews().data;
      var isZh = AppState.currentLang === 'zh';

      // Hero background
      document.getElementById('heroBg').style.backgroundImage = 'url(\'' + news.img + '\')';

      // Hero badge
      document.getElementById('heroBadge').textContent = isZh ? news.tagText : news.tag.toUpperCase();

      // Hero title
      document.getElementById('heroTitleEn').textContent = news.titleEn;
      document.getElementById('heroTitleZh').textContent = news.title;

      // Hero date
      var dateStr = news.date.day + ' ' + news.date.month + ' ' + news.date.year;
      document.getElementById('heroDate').textContent = dateStr;

      // News tag
      var tagEl = document.getElementById('newsTag');
      tagEl.textContent = isZh ? news.tagText : news.tag.toUpperCase();
      tagEl.className = 'news-tag ' + news.tag;

      // News date text
      document.getElementById('newsDateText').textContent = dateStr;

      // Featured image
      var imgEl = document.getElementById('newsFeaturedImg');
      imgEl.src = news.img;
      imgEl.alt = isZh ? news.title : news.titleEn;

      // News body
      var bodyHtml = '<div class="en-content">' + (news.contentEn || news.descEn) + '</div>';
      bodyHtml += '<div class="zh-content">' + (news.content || news.desc) + '</div>';
      document.getElementById('newsBody').innerHTML = bodyHtml;

      // Page title
      document.title = (isZh ? news.title : news.titleEn) + ' | Zhangjiajie Park';
    }

    // ========== RENDER RELATED NEWS ==========
    function renderRelatedNews() {
      var current = getCurrentNews();
      var currentIndex = current.index;
      var isZh = AppState.currentLang === 'zh';
      var container = document.getElementById('relatedGrid');
      var html = '';

      // Show up to 3 related news (excluding current)
      var count = 0;
      for (var i = 0; i < newsData.length && count < 3; i++) {
        if (i === currentIndex) continue;
        var item = newsData[i];
        html += '<a href="news-detail.html?id=' + i + '" class="related-card">';
        html += '<div class="related-img" style="background-image: url(\'' + item.img + '\')"></div>';
        html += '<div class="related-body">';
        html += '<h4 class="related-card-title">' + (isZh ? item.title : item.titleEn) + '</h4>';
        html += '<p class="related-card-date">' + item.date.day + ' ' + item.date.month + ' ' + item.date.year + '</p>';
        html += '</div></a>';
        count++;
      }

      container.innerHTML = html;
    }

    // ========== INITIALIZE ==========
    document.addEventListener('DOMContentLoaded', function() {
      renderNewsDetail();
      renderRelatedNews();
    });
  </script>
</body>
</html>
