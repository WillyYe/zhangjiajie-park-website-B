  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      color: #1a1a1a;
      background: #fff;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    
    /* ========== COLOR VARIABLES ========== */
    :root {
      --green-dark: #0d2b1e;
      --green-mid: #1a4a30;
      --green-light: #2d6a4f;
      --green-accent: #52b788;
      --gold: #b5882a;
      --gold-light: #d4a843;
      --cream: #f7f3ee;
      --cream-dark: #e8e4de;
      --text-dark: #1a1a1a;
      --text-mid: #4a4a4a;
      --text-light: #888;
      --white: #fff;
    }
    
    /* ========== HEADER ========== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: var(--green-dark);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--white);
    }
    .header-logo-icon {
      width: 40px;
      height: 40px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .header-logo-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 14px;
      font-weight: 600;
    }
    .lang-switch {
      display: flex;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
    }
    .lang-switch button {
      padding: 6px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      transition: background 0.2s, color 0.2s;
    }
    .lang-switch button.active {
      background: var(--gold);
      color: var(--white);
    }
    
    /* ========== HERO ========== */
    .hero {
      height: 60vh;
      min-height: 400px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      text-align: center;
      margin-top: 64px;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.5));
    }
    .hero-content {
      position: relative;
      z-index: 10;
      padding: 0 24px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    .hero-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      margin-bottom: 12px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .hero-subtitle {
      font-size: clamp(14px, 2vw, 18px);
      opacity: 0.9;
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* ========== CONTENT ========== */
    .content-section {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--green-mid);
      font-size: 14px;
      margin-bottom: 32px;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: var(--green-dark);
    }
    
    /* ========== GALLERY ========== */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 32px 0;
    }
    .gallery-item {
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .gallery-item:hover {
      transform: scale(1.03);
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .gallery-item:first-child {
      grid-column: span 2;
      grid-row: span 2;
    }
    
    /* ========== INFO CARDS ========== */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin: 32px 0;
    }
    .info-card {
      background: var(--cream);
      padding: 24px;
      border-radius: 12px;
      text-align: center;
      transition: transform 0.25s;
    }
    .info-card:hover {
      transform: translateY(-4px);
    }
    .info-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .info-label {
      font-size: 12px;
      color: var(--text-light);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .info-value {
      font-size: 16px;
      font-weight: 500;
      color: var(--green-dark);
    }
    
    /* ========== SECTION ========== */
    .section {
      margin-bottom: 48px;
    }
    .section-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--green-dark);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--cream-dark);
    }
    .section p {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.9;
      margin-bottom: 16px;
    }
    
    /* ========== TIPS ========== */
    .tip-box {
      background: linear-gradient(135deg, #f0faf4, #e8f5ec);
      border-left: 4px solid var(--green-accent);
      padding: 24px;
      border-radius: 0 12px 12px 0;
      margin: 24px 0;
    }
    .tip-box h4 {
      font-size: 15px;
      font-weight: 600;
      color: var(--green-dark);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tip-box ul {
      margin: 12px 0 0;
      padding-left: 20px;
    }
    .tip-box li {
      font-size: 14px;
      color: var(--text-mid);
      margin-bottom: 8px;
    }
    
    /* ========== CTA ========== */
    .cta-section {
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      color: var(--white);
      padding: 48px;
      border-radius: 16px;
      text-align: center;
      margin-top: 48px;
    }
    .cta-section h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      margin-bottom: 12px;
    }
    .cta-section p {
      opacity: 0.85;
      margin-bottom: 24px;
      color: var(--white);
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--gold);
      color: var(--white);
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s, transform 0.2s;
    }
    .cta-btn:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }
    
    /* ========== FOOTER ========== */
    .footer {
      padding: 40px 24px;
      text-align: center;
      background: var(--cream);
      font-size: 13px;
      color: var(--text-light);
    }
    .footer a {
      color: var(--green-mid);
    }
    
    /* ========== LANGUAGE TOGGLE ========== */
    [lang="zh"] .en-content { display: none; }
    [lang="en"] .zh-content { display: none; }
    
    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
      .gallery-item:first-child {
        grid-column: span 2;
        grid-row: span 1;
      }
      .info-grid { grid-template-columns: repeat(2, 1fr); }
      .cta-section { padding: 32px 24px; }
    }
    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: 1fr;
      }
      .gallery-item:first-child {
        grid-column: span 1;
      }
    }
  </style>
</head>

        descZh: '<p>张家界提供云海和观星的令人叹为观止的体验。当潮湿的空气凝结成厚厚的云层填满峰谷之间时，就会出现云海现象。</p><p>观云海的最佳地点是天子山和杨家界。对于观星，远离城市灯光的偏远地点提供了清澈的夜空，非常适合天文摄影。</p><p>许多游客选择在山上过夜，以捕捉日落和日出，那时云层最为壮观。</p>',
        info: [
          { icon: '🌅', label: 'Sunrise', labelZh: '日出', value: '6:00-7:00' },
          { icon: '🌃', label: 'Stargazing', labelZh: '观星', value: 'After 20:00' },
          { icon: '🏔️', label: 'Best Spot', labelZh: '最佳地点', value: 'Tianzi Mtn' },
          { icon: '🏨', label: 'Stay', labelZh: '住宿', value: 'Mountain Inn' }
        ],
        highlights: [
          { icon: '🌊', name: 'Sea of Clouds', nameZh: '云海', desc: 'Spectacular cloud formations', descZh: '壮观的云层形态' },
          { icon: '⭐', name: 'Starry Sky', nameZh: '星空', desc: 'Milky Way visible', descZh: '可见银河' },
          { icon: '🌄', name: 'Sunrise', nameZh: '日出', desc: 'Golden hour magic', descZh: '黄金时段魔法' }
        ],
        tips: [
          'Check weather - clear skies are best for stargazing',
          'Bring warm clothes (mountain temperatures drop at night)',
          'Stay at mountain accommodation for convenience',
          'Use red light flashlight to preserve night vision'
        ],
        tipsZh: [
          '查看天气 - 晴朗夜空最适合观星',
          '带保暖衣物（山上夜间温度下降）',
          '住山上住宿更方便',
          '用红光手电筒保护夜视能力'
        ]
      }
    ];
    
    // ========== APP STATE ==========
    var AppState = {
      currentLang: 'en'
    };
    
    // ========== GET EXPERIENCE ID FROM URL ==========
    function getExpId() {
      var params = new URLSearchParams(window.location.search);
      return params.get('id') || 'hiking';
    }
    
    // ========== GET CURRENT EXPERIENCE DATA ==========
    function getCurrentExp() {
      var id = getExpId();
      for (var i = 0; i < allExpData.length; i++) {
        if (allExpData[i].id === id) {
          return { data: allExpData[i], index: i };
        }
      }
      return { data: allExpData[0], index: 0 };
    }
    
    // ========== SWITCH LANGUAGE ==========
    function switchLang(lang) {
      AppState.currentLang = lang;
      document.body.lang = lang;
      
      // Update header buttons
      document.querySelectorAll('.lang-switch button').forEach(function(btn) {
        btn.classList.remove('active');
      });
      document.querySelector('.lang-switch button[data-lang="' + lang + '"]').classList.add('active');
    }
    
    // ========== RENDER HERO ==========
    function renderHero() {
      var exp = getCurrentExp().data;
      
      // Set hero background image
      document.getElementById('heroBg').style.backgroundImage = 'url(\'' + exp.images[0] + '\')';
      
      // Set badge
      document.getElementById('heroBadgeEn').textContent = exp.badge;
      document.getElementById('heroBadgeZh').textContent = exp.badgeZh;
      
      // Set title
      document.getElementById('heroTitleEn').textContent = exp.title;
      document.getElementById('heroTitleZh').textContent = exp.titleZh;
      
      // Set subtitle
      document.getElementById('heroSubtitleEn').textContent = exp.subtitle;
      document.getElementById('heroSubtitleZh').textContent = exp.subtitleZh;
      
      // Update page title
      document.title = exp.title + ' | Zhangjiajie Park';
    }
    
    // ========== RENDER GALLERY ==========
    function renderGallery() {
      var exp = getCurrentExp().data;
      var container = document.getElementById('gallerySection');
      var html = '';
      
      exp.images.forEach(function(img, index) {
        html += '<div class="gallery-item">';
        html += '<img src="' + img + '" alt="' + exp.title + ' - Image ' + (index + 1) + '" loading="lazy" decoding="async">';
        html += '</div>';
      });
      
      container.innerHTML = html;
    }
    
    // ========== RENDER INFO CARDS ==========
    function renderInfoCards() {
      var exp = getCurrentExp().data;
      var container = document.getElementById('infoGrid');
      var html = '';
      
      exp.info.forEach(function(item) {
        html += '<div class="info-card">';
        html += '<div class="info-icon">' + item.icon + '</div>';
        html += '<div class="info-label en-content">' + item.label + '</div>';
        html += '<div class="info-label zh-content">' + item.labelZh + '</div>';
        html += '<div class="info-value">' + item.value + '</div>';
        html += '</div>';
      });
      
      container.innerHTML = html;
    }
    
    // ========== RENDER DESCRIPTION ==========
    function renderDescription() {
      var exp = getCurrentExp().data;
      
      document.getElementById('descTitleEn').textContent = 'About ' + exp.title;
      document.getElementById('descTitleZh').textContent = '关于 ' + exp.titleZh;
      document.getElementById('descContent').innerHTML = '<div class="en-content">' + exp.desc + '</div><div class="zh-content">' + exp.descZh + '</div>';
    }
    
    // ========== RENDER HIGHLIGHTS ==========
    function renderHighlights() {
      var exp = getCurrentExp().data;
      var container = document.getElementById('highlightsContent');
      
      document.getElementById('highlightsTitleEn').textContent = 'Highlights';
      document.getElementById('highlightsTitleZh').textContent = '亮点';
      
      var html = '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-top: 20px;">';
      exp.highlights.forEach(function(item) {
        html += '<div style="background: var(--cream); padding: 20px; border-radius: 12px;">';
        html += '<div style="font-size: 32px; margin-bottom: 12px;">' + item.icon + '</div>';
        html += '<h4 class="en-content" style="font-size: 16px; font-weight: 600; color: var(--green-dark); margin-bottom: 8px;">' + item.name + '</h4>';
        html += '<h4 class="zh-content" style="font-size: 16px; font-weight: 600; color: var(--green-dark); margin-bottom: 8px;">' + item.nameZh + '</h4>';
        html += '<p class="en-content" style="font-size: 14px; color: var(--text-mid);">' + item.desc + '</p>';
        html += '<p class="zh-content" style="font-size: 14px; color: var(--text-mid);">' + item.descZh + '</p>';
        html += '</div>';
      });
      html += '</div>';
      
      container.innerHTML = html;
    }
    
    // ========== RENDER TIPS ==========
    function renderTips() {
      var exp = getCurrentExp().data;
      var isZh = AppState.currentLang === 'zh';
      
      document.getElementById('tipsTitle').innerHTML = (isZh ? '💡 实用贴士' : '💡 Travel Tips');
      
      var tipsEnHtml = '';
      exp.tips.forEach(function(tip) {
        tipsEnHtml += '<li>' + tip + '</li>';
      });
      document.getElementById('tipsListEn').innerHTML = tipsEnHtml;
      
      var tipsZhHtml = '';
      exp.tipsZh.forEach(function(tip) {
        tipsZhHtml += '<li>' + tip + '</li>';
      });
      document.getElementById('tipsListZh').innerHTML = tipsZhHtml;
    }
    
    // ========== INITIALIZE ==========
    document.addEventListener('DOMContentLoaded', function() {
      renderHero();
      renderGallery();
      renderInfoCards();
      renderDescription();
      renderHighlights();
      renderTips();
    });
  </script>
</body>
</html>
